<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Avshalom Kigler Portfolio Preview</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        background: #fff;
        color: #000;
        font-family:
          "Assistant",
          Arial,
          "Helvetica Neue",
          sans-serif;
      }

      ::selection {
        background: #000;
        color: #fff;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .site {
        min-height: 100vh;
        background: #fff;
        color: #000;
      }

      .container {
        width: min(100% - 40px, 1280px);
        margin: 0 auto;
      }

      .header {
        position: sticky;
        top: 0;
        z-index: 50;
        border-bottom: 1px solid rgb(0 0 0 / 0.1);
        background: rgb(255 255 255 / 0.85);
        backdrop-filter: blur(18px);
      }

      .header-inner {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px 0;
      }

      .brand {
        font-size: 16px;
        font-weight: 700;
        letter-spacing: -0.01em;
      }

      .nav {
        display: flex;
        align-items: center;
        gap: 20px;
        color: rgb(0 0 0 / 0.6);
        font-size: 13px;
      }

      .nav a:hover {
        color: #000;
      }

      .lang-button,
      .button {
        border-radius: 999px;
      }

      .lang-button {
        border: 1px solid #000;
        background: transparent;
        color: #000;
        cursor: pointer;
        padding: 10px 16px;
        font: inherit;
        font-size: 14px;
        transition:
          background 0.2s ease,
          color 0.2s ease;
      }

      .lang-button:hover,
      .button.secondary:hover {
        background: #000;
        color: #fff;
      }

      .hero {
        display: flex;
        min-height: 88vh;
        flex-direction: column;
        justify-content: center;
        padding: 80px 0;
      }

      .kicker,
      .number {
        margin: 0;
        color: rgb(0 0 0 / 0.45);
        font-size: 14px;
        letter-spacing: 0.45em;
        text-transform: uppercase;
      }

      .number {
        letter-spacing: 0.35em;
      }

      .hero-title,
      .work-title,
      .about-title,
      .footer-title {
        margin: 0;
        font-family:
          "Assistant",
          Arial,
          "Helvetica Neue",
          sans-serif;
        font-weight: 800;
        letter-spacing: 0;
      }

      .hero-title {
        max-width: 1120px;
        margin-top: 24px;
        font-size: clamp(56px, 10vw, 128px);
        line-height: 0.95;
      }

      .intro {
        max-width: 900px;
        margin: 32px 0 0;
        color: rgb(0 0 0 / 0.6);
        font-size: 24px;
        line-height: 1.65;
        white-space: pre-line;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 40px;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: fit-content;
        min-height: 44px;
        padding: 12px 20px;
        border: 1px solid #000;
        font-size: 14px;
        font-weight: 700;
        transition:
          background 0.2s ease,
          color 0.2s ease,
          opacity 0.2s ease;
      }

      .button.primary {
        background: #000;
        color: #fff;
      }

      .button.primary:hover {
        opacity: 0.75;
      }

      .work-section,
      .about,
      .footer {
        border-top: 1px solid rgb(0 0 0 / 0.15);
      }

      .work-section {
        padding: 96px 0;
      }

      .work-grid {
        display: grid;
        grid-template-columns: 1fr;
        align-items: start;
        gap: 32px;
      }

      .work-title {
        font-size: clamp(48px, 7vw, 96px);
        line-height: 0.95;
      }

      .work-text {
        max-width: 680px;
        margin: 24px 0 0;
        color: rgb(0 0 0 / 0.55);
        font-size: 18px;
        line-height: 1.8;
      }

      .work-grid .button {
        margin-top: 16px;
      }

      .content-placeholder {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 224px;
        margin-top: 40px;
        border: 1px dashed rgb(0 0 0 / 0.25);
        border-radius: 32px;
        background: rgb(0 0 0 / 0.02);
        color: rgb(0 0 0 / 0.4);
        padding: 32px;
        text-align: center;
      }

      .work-item {
        margin: 0;
      }

      .work-status {
        margin: 14px 0 0;
        color: rgb(0 0 0 / 0.5);
        font-size: 18px;
        font-weight: 700;
        text-align: center;
      }

      .work-item-title {
        margin: 10px auto 22px;
        max-width: 760px;
        font-size: clamp(28px, 4vw, 52px);
        font-weight: 700;
        letter-spacing: -0.02em;
        line-height: 1.1;
        text-align: center;
      }

      .work-item-title.small {
        font-size: clamp(20px, 2vw, 28px);
        margin-bottom: 16px;
      }

      .work-media-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 28px;
        margin-top: 40px;
      }

      .work-image,
      .work-video {
        display: block;
        width: 75%;
        height: auto;
        margin: 0 auto;
        border: 1px solid rgb(0 0 0 / 0.12);
        border-radius: 24px;
        background: #f3f3f3;
      }

      .work-video {
        aspect-ratio: 9 / 16;
        max-height: 520px;
        object-fit: cover;
      }

      #wolt-content .work-image {
        width: 62%;
      }

      .mockup-subgroup {
        margin-top: 64px;
      }

      .mockup-subtitle {
        margin: 0 0 28px;
        font-family:
          "Assistant",
          Arial,
          "Helvetica Neue",
          sans-serif;
        font-size: clamp(16px, 1.8vw, 26px);
        font-weight: 700;
        letter-spacing: 0;
        line-height: 1.15;
        text-align: center;
      }

      .mockup-note {
        margin: 0 auto 14px;
        max-width: 520px;
        color: rgb(0 0 0 / 0.64);
        font-size: clamp(18px, 1.8vw, 26px);
        font-weight: 700;
        line-height: 1.25;
        text-align: center;
      }

      .mockup-note strong {
        display: block;
        color: #000;
        font-size: clamp(22px, 2vw, 32px);
      }

      .campaign-list {
        display: grid;
        gap: 56px;
        margin-top: 48px;
      }

      .campaign-item {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1.1fr);
        gap: 40px;
        align-items: start;
        padding-top: 32px;
        border-top: 1px solid rgb(0 0 0 / 0.12);
      }

      .campaign-copy {
        display: grid;
        gap: 16px;
      }

      .campaign-title {
        margin: 0;
        font-size: clamp(24px, 2.4vw, 38px);
        font-weight: 800;
        line-height: 1.15;
      }

      .campaign-text {
        margin: 0;
        color: rgb(0 0 0 / 0.62);
        font-size: 18px;
        line-height: 1.65;
      }

      .campaign-preview-row {
        display: grid;
        gap: 0;
        align-items: center;
      }

      .campaign-item.is-open .campaign-preview-row {
        grid-template-columns: 1fr;
      }

      .campaign-preview {
        overflow: hidden;
        margin: 0;
        color: rgb(0 0 0 / 0.58);
        font-size: 18px;
        line-height: 1.55;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .campaign-item.is-open .campaign-preview {
        overflow: visible;
        color: rgb(0 0 0 / 0.62);
        text-overflow: clip;
        white-space: normal;
      }

      .campaign-toggle {
        display: grid;
        width: 34px;
        height: 34px;
        place-items: center;
        border: 1px solid rgb(0 0 0 / 0.18);
        border-radius: 50%;
        background: transparent;
        color: #000;
        cursor: pointer;
        transition:
          border-color 0.2s ease,
          transform 0.2s ease;
      }

      .campaign-toggle-wrap {
        display: flex;
        justify-content: flex-start;
      }

      .campaign-toggle:hover {
        border-color: #000;
      }

      .campaign-item.is-open .campaign-toggle {
        margin-top: 2px;
      }

      .campaign-arrow {
        width: 8px;
        height: 8px;
        border-right: 1.5px solid currentColor;
        border-bottom: 1.5px solid currentColor;
        transform: translateY(-2px) rotate(45deg);
        transition: transform 0.28s ease;
      }

      .campaign-item.is-open .campaign-arrow {
        transform: translateY(2px) rotate(225deg);
      }

      .campaign-full {
        overflow: hidden;
        max-height: 0;
        opacity: 0;
        transition:
          max-height 0.36s ease,
          opacity 0.24s ease;
      }

      .campaign-item.is-open .campaign-full {
        max-height: 360px;
        opacity: 1;
      }

      .campaign-media {
        display: grid;
        gap: 18px;
      }

      .campaign-media-rich {
        grid-template-columns: minmax(220px, 0.7fr) minmax(0, 1.3fr);
        gap: 34px;
        align-items: start;
        direction: ltr;
      }

      .campaign-subsection-wide {
        grid-column: 1 / -1;
      }

      .campaign-subsection {
        display: grid;
        gap: 18px;
        direction: rtl;
      }

      .campaign-subsection-instagram {
        grid-column: 2;
      }

      .campaign-subsection-merch {
        grid-column: 2;
      }

      .campaign-subsection-merch .work-image {
        width: 100%;
        border-radius: 16px;
      }

      .campaign-subsection-social {
        grid-column: 1;
      }

      .campaign-copy .campaign-subsection-social {
        margin-top: 8px;
      }

      .campaign-copy .campaign-subsection-social .work-media-grid {
        gap: 16px;
        margin-top: 0;
      }

      .campaign-copy .campaign-subsection-social .work-image {
        width: 100%;
        border-radius: 16px;
      }

      .campaign-copy .campaign-subsection-social .soulmate-landing-item {
        grid-column: 1 / -1;
      }

      .campaign-copy .campaign-subsection-social .soulmate-merch-item {
        grid-column: 1 / -1;
      }

      .campaign-subtitle {
        margin: 0;
        font-size: clamp(18px, 1.7vw, 26px);
        font-weight: 800;
        line-height: 1.2;
      }

      .campaign-link-card {
        display: inline-flex;
        width: fit-content;
        align-items: center;
        justify-content: center;
        min-height: 42px;
        padding: 10px 18px;
        border: 1px solid #000;
        border-radius: 999px;
        color: #000;
        font-size: 15px;
        font-weight: 700;
        transition:
          background 0.2s ease,
          color 0.2s ease;
      }

      .campaign-link-card:hover {
        background: #000;
        color: #fff;
      }

      .instagram-preview-card {
        display: grid;
        gap: 12px;
        align-content: center;
        min-height: 180px;
        padding: 24px;
        border: 1px solid rgb(0 0 0 / 0.12);
        border-radius: 10px;
        background: #fff;
      }

      .instagram-preview-card p {
        margin: 0;
        color: rgb(0 0 0 / 0.58);
        font-size: 15px;
        line-height: 1.5;
      }

      .carousel {
        position: relative;
        width: min(100%, 820px);
      }

      .carousel-frame {
        overflow: hidden;
        border-radius: 10px;
        background: #fff;
      }

      .carousel-track {
        display: flex;
        direction: ltr;
        transition: transform 0.36s ease;
      }

      .carousel-slide {
        display: block;
        flex: 0 0 100%;
        width: 100%;
        height: auto;
      }

      .carousel-controls {
        display: flex;
        position: absolute;
        top: 50%;
        left: -82px;
        transform: translateY(-50%);
      }

      .carousel-next {
        display: grid;
        width: 32px;
        height: 32px;
        place-items: center;
        border: 1px solid rgb(0 0 0 / 0.18);
        border-radius: 50%;
        background: transparent;
        color: #000;
        cursor: pointer;
        transition:
          border-color 0.2s ease,
          transform 0.2s ease;
      }

      .carousel-next:hover {
        border-color: #000;
      }

      .carousel-next-mark {
        width: 7px;
        height: 7px;
        border-left: 1.5px solid currentColor;
        border-bottom: 1.5px solid currentColor;
        transform: translateX(2px) rotate(45deg);
      }

      .campaign-media .carousel-slide {
        border: 0;
        border-radius: 10px;
      }

      .reference-layout {
        display: grid;
        grid-template-columns: minmax(0, 0.9fr) minmax(0, 1.1fr);
        gap: 56px;
        margin-top: 48px;
        align-items: start;
      }

      .reference-media {
        min-height: 560px;
        border: 1px solid rgb(0 0 0 / 0.14);
        border-radius: 24px;
        background: rgb(0 0 0 / 0.025);
        display: flex;
        align-items: center;
        justify-content: center;
        color: rgb(0 0 0 / 0.38);
        font-size: 18px;
        font-weight: 700;
        text-align: center;
      }

      .reference-video {
        display: block;
        width: 100%;
        aspect-ratio: 16 / 9;
        border: 0;
        border-radius: 24px;
      }

      .reference-video-wrap {
        display: grid;
        gap: 16px;
      }

      .youtube-link-card {
        display: flex;
        min-height: 360px;
        align-items: center;
        justify-content: center;
        border: 1px solid rgb(0 0 0 / 0.14);
        border-radius: 24px;
        background:
          linear-gradient(rgb(0 0 0 / 0.38), rgb(0 0 0 / 0.58)),
          url("https://img.youtube.com/vi/pcTtKsEKG44/maxresdefault.jpg") center / cover;
        color: #fff;
        text-align: center;
        transition: opacity 0.2s ease;
      }

      .youtube-link-card.tzahi {
        background:
          linear-gradient(rgb(0 0 0 / 0.38), rgb(0 0 0 / 0.58)),
          url("https://img.youtube.com/vi/6iQZJq35ca4/maxresdefault.jpg") center / cover;
      }

      .social-link-card {
        display: flex;
        min-height: 260px;
        align-items: center;
        justify-content: center;
        border: 1px solid rgb(0 0 0 / 0.14);
        border-radius: 18px;
        background: #fff;
        color: #000;
        text-align: center;
        transition:
          background 0.2s ease,
          color 0.2s ease;
      }

      .social-link-card:hover {
        background: #000;
        color: #fff;
      }

      .social-link-card span {
        display: grid;
        gap: 10px;
        padding: 24px;
        font-size: 16px;
        font-weight: 700;
      }

      .social-link-card strong {
        font-size: clamp(24px, 3vw, 40px);
        letter-spacing: -0.02em;
      }

      .site-preview-card {
        display: block;
        overflow: hidden;
        border: 1px solid rgb(0 0 0 / 0.14);
        border-radius: 24px;
        background: #fff;
        color: #000;
        transition:
          opacity 0.2s ease,
          transform 0.2s ease;
      }

      .site-preview-card:hover {
        opacity: 0.86;
        transform: translateY(-2px);
      }

      .site-preview-thumb {
        min-height: 260px;
        border-bottom: 1px solid rgb(0 0 0 / 0.14);
        background:
          linear-gradient(rgb(0 0 0 / 0.02), rgb(0 0 0 / 0.1)),
          url("fans-site-preview.jpg") center 38% / cover;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 28px;
        text-align: center;
      }

      .site-preview-thumb span {
        display: block;
        max-width: 360px;
        color: #fff;
        font-size: clamp(34px, 5vw, 72px);
        font-weight: 700;
        line-height: 0.95;
        letter-spacing: -0.03em;
      }

      .site-preview-meta {
        display: grid;
        gap: 6px;
        padding: 22px;
        background: #000;
        color: #fff;
      }

      .site-preview-meta strong {
        font-size: clamp(22px, 2.4vw, 34px);
        letter-spacing: -0.02em;
      }

      .site-preview-meta small {
        color: rgb(255 255 255 / 0.68);
        font-size: 14px;
        font-weight: 700;
      }

      .youtube-link-card:hover {
        opacity: 0.86;
      }

      .youtube-link-inner {
        display: grid;
        gap: 18px;
        justify-items: center;
        padding: 32px;
      }

      .play-mark {
        display: grid;
        width: 72px;
        height: 72px;
        place-items: center;
        border: 1px solid rgb(255 255 255 / 0.55);
        border-radius: 50%;
        font-size: 30px;
        line-height: 1;
      }

      .youtube-link-title {
        margin: 0;
        font-size: clamp(26px, 3vw, 44px);
        font-weight: 700;
        letter-spacing: -0.02em;
      }

      .youtube-link-text {
        margin: 0;
        color: rgb(255 255 255 / 0.68);
        font-size: 16px;
      }

      .reference-copy {
        display: grid;
        gap: 36px;
      }

      .reference-lead {
        margin: 0;
        font-size: clamp(28px, 3.4vw, 52px);
        font-weight: 700;
        line-height: 1.22;
        letter-spacing: -0.01em;
      }

      .reference-lead.compact {
        font-size: clamp(17px, 2vw, 31px);
      }

      .reference-card {
        border: 1px solid rgb(0 0 0 / 0.14);
        border-radius: 24px;
        padding: 32px;
        background: #fff;
      }

      .reference-card p {
        margin: 0;
        color: rgb(0 0 0 / 0.72);
        font-size: clamp(20px, 2vw, 28px);
        line-height: 1.45;
      }

      .reference-mini-title {
        margin: 0 0 12px;
        color: #000;
        font-size: 16px;
        font-weight: 700;
      }

      .reference-image {
        display: block;
        width: 100%;
        height: auto;
        border: 1px solid rgb(0 0 0 / 0.12);
        border-radius: 16px;
      }

      .zoom-button {
        display: block;
        width: 100%;
        padding: 0;
        border: 0;
        background: transparent;
        cursor: zoom-in;
      }

      [data-zoom-src] {
        cursor: zoom-in;
      }

      .image-modal {
        position: fixed;
        inset: 0;
        z-index: 100;
        display: none;
        align-items: center;
        justify-content: center;
        background: rgb(255 255 255 / 0.92);
        padding: 28px;
      }

      .image-modal.is-open {
        display: flex;
      }

      .image-modal img {
        max-width: min(100%, 1400px);
        max-height: 92vh;
        border: 1px solid rgb(0 0 0 / 0.16);
        border-radius: 18px;
        background: #fff;
        object-fit: contain;
      }

      .image-modal-close {
        position: absolute;
        top: 24px;
        inset-inline-end: 24px;
        width: 44px;
        height: 44px;
        border: 1px solid #000;
        border-radius: 50%;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-size: 24px;
        line-height: 1;
      }

      .tiktok-embed-block {
        margin: 0;
      }

      .tiktok-embed-block .tiktok-embed {
        margin: 0 auto !important;
        max-width: 100%;
        min-width: 0;
        border: 1px solid rgb(0 0 0 / 0.12);
        border-radius: 16px;
        overflow: hidden;
      }

      .reference-side-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 24px;
        align-items: start;
      }

      .tiktok-centered {
        width: min(100%, 520px);
        margin: 0 auto;
      }

      .about {
        padding: 96px 0;
      }

      .about-grid {
        display: grid;
        grid-template-columns: 0.35fr 1fr 0.55fr;
        gap: 32px;
        align-items: start;
      }

      .about-title {
        font-size: clamp(48px, 6vw, 84px);
        line-height: 1;
      }

      .about-text {
        max-width: 820px;
        margin: 0;
        color: rgb(0 0 0 / 0.65);
        font-size: clamp(28px, 3vw, 44px);
        line-height: 1.35;
        white-space: pre-line;
      }

      .about-image {
        width: 100%;
        height: min(52vw, 520px);
        min-height: 340px;
        border-radius: 28px;
        object-fit: cover;
        object-position: center 18%;
      }

      .footer {
        padding: 48px 0;
      }

      .footer-inner {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 24px;
      }

      .contact-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }

      .button.whatsapp {
        border-color: #25d366;
        background: #25d366;
        color: #000;
      }

      .button.whatsapp:hover {
        opacity: 0.78;
      }

      .footer-title {
        font-size: clamp(40px, 5vw, 72px);
        line-height: 1;
      }

      @media (max-width: 767px) {
        .container {
          width: min(100% - 40px, 100%);
        }

        .nav {
          display: none;
        }

        .hero {
          padding: 72px 0;
        }

        .intro {
          font-size: 20px;
          line-height: 1.65;
        }

        .work-section,
        .about {
          padding: 64px 0;
        }

        .work-grid,
        .about-grid,
        .work-media-grid,
        .campaign-item,
        .reference-layout,
        .reference-side-grid {
          grid-template-columns: 1fr;
        }

        .reference-layout {
          gap: 28px;
        }

        .campaign-preview-row {
          grid-template-columns: 1fr;
          gap: 12px;
        }

        .campaign-media-rich {
          grid-template-columns: 1fr;
        }

        .campaign-subsection-wide {
          grid-column: auto;
        }

        .campaign-subsection-instagram,
        .campaign-subsection-merch,
        .campaign-subsection-social {
          grid-column: auto;

                        <p class="campaign-text">${escapeHtml(t.transparentBagText)}</p>
                      </div>
                      <div class="campaign-toggle-wrap">
                        <button class="campaign-toggle" type="button" aria-label="${escapeHtml(t.openDetailsLabel)}" aria-expanded="false">
                          <span class="campaign-arrow" aria-hidden="true"></span>
                        </button>
                      </div>
                    </div>
                    <div class="campaign-media">
                      <img class="work-image" src="mockup-guerrilla-wolt-transparent-bag.png" alt="${escapeHtml(t.transparentBagAlt)}" />
                    </div>
                  </article>
                  <article class="campaign-item">
                    <div class="campaign-copy">
                      <h3 class="campaign-title">${escapeHtml(t.wishWallTitle)}</h3>
                      <div class="campaign-preview-row">
                        <p class="campaign-preview">${escapeHtml(t.wishWallPreview)}</p>
                      </div>
                      <div class="campaign-full" aria-hidden="true">
                        <p class="campaign-text">${escapeHtml(t.wishWallText)}</p>
                      </div>
                      <div class="campaign-toggle-wrap">
                        <button class="campaign-toggle" type="button" aria-label="${escapeHtml(t.openDetailsLabel)}" aria-expanded="false">
                          <span class="campaign-arrow" aria-hidden="true"></span>
                        </button>
                      </div>
                    </div>
                    <div class="campaign-media">
                      <img class="work-image" src="mockup-guerrilla-wolt-wish-wall.png" alt="${escapeHtml(t.wishWallAlt)}" />
                    </div>
                  </article>
                </div>
              `
            : id === "own"
              ? `
                <div class="container reference-layout" id="${escapeHtml(id)}-content">
                  <div class="reference-video-wrap">
                    <a class="youtube-link-card" href="https://www.youtube.com/watch?v=pcTtKsEKG44" target="_blank" rel="noreferrer">
                      <span class="youtube-link-inner">
                        <span class="play-mark" aria-hidden="true">▶</span>
                        <span class="youtube-link-title">${escapeHtml(t.hazonishSongTitle)}</span>
                        <span class="youtube-link-text">${escapeHtml(t.youtubeLabel)}</span>
                      </span>
                    </a>
                  </div>
                  <div class="reference-copy">
                    <p class="reference-lead compact">
                      ${escapeHtml(t.hazonishText)}
                    </p>
                    <div class="reference-side-grid">
                      <figure class="work-item">
                        <figcaption class="reference-mini-title">${escapeHtml(t.debutPostTitle)}</figcaption>
                        <button class="zoom-button" type="button" data-zoom-src="hazonish-debut-post-text.png" aria-label="${escapeHtml(t.debutPostZoomLabel)}">
                          <img class="reference-image" src="hazonish-debut-post-text.png" alt="${escapeHtml(t.debutPostAlt)}" />
                        </button>
                      </figure>
                      <div class="tiktok-embed-block">
                        <p class="reference-mini-title">${escapeHtml(t.tiktokTrendTitle)}</p>
                        <blockquote
                          class="tiktok-embed"
                          cite="https://www.tiktok.com/music/פראיירים-7401919142259312657?is_from_webapp=1&sender_device=pc"
                          data-embed-type="music"
                          data-music-id="7401919142259312657"
                        >
                          <section>
                            <a href="https://www.tiktok.com/music/פראיירים-7401919142259312657?is_from_webapp=1&sender_device=pc" target="_blank" rel="noreferrer">
                              ${escapeHtml(t.tiktokTrendLinkText)}
                            </a>
                          </section>
                        </blockquote>
                      </div>
                    </div>
                  </div>
                </div>
              `
            : id === "tzahi"
              ? `
                <div class="container reference-layout" id="${escapeHtml(id)}-content">
                  <div class="reference-video-wrap">
                    <a class="youtube-link-card tzahi" href="https://www.youtube.com/watch?v=6iQZJq35ca4" target="_blank" rel="noreferrer">
                      <span class="youtube-link-inner">
                        <span class="play-mark" aria-hidden="true">▶</span>
                        <span class="youtube-link-title">${escapeHtml(t.tzahi)}</span>
                        <span class="youtube-link-text">${escapeHtml(t.youtubeLabel)}</span>
                      </span>
                    </a>
                  </div>
                  <div class="reference-copy">
                    <p class="reference-lead compact">
                      ${escapeHtml(t.tzahiText)}
                    </p>
                    <div class="tiktok-embed-block tiktok-centered">
                      <p class="reference-mini-title">${escapeHtml(t.tzahiTiktokTitle)}</p>
                      <blockquote
                        class="tiktok-embed"
                        cite="https://www.tiktok.com/@tzachirock"
                        data-unique-id="tzachirock"
                        data-embed-type="creator"
                      >
                        <section>
                          <a href="https://www.tiktok.com/@tzachirock" target="_blank" rel="noreferrer">
                            @tzachirock
                          </a>
                        </section>
                      </blockquote>
                    </div>
                  </div>
                </div>
              `
            : `
              <div id="${escapeHtml(id)}-content" class="container content-placeholder">
                ${escapeHtml(text)}
              </div>
            `;

        return `
          <section id="${escapeHtml(id)}" class="work-section">
            <div class="container work-grid">
              <div>
                <h2 class="work-title">${escapeHtml(title)}</h2>
                ${text ? `<p class="work-text">${escapeHtml(text)}</p>` : ""}
              </div>
            </div>

            ${contentHtml}
          </section>
        `;
      }

      function render() {
        const t = content[lang];
        const isHebrew = lang === "he";

        document.documentElement.lang = lang;
        document.documentElement.dir = isHebrew ? "rtl" : "ltr";

        app.innerHTML = `
          <header class="header">
            <div class="container header-inner">
              <a href="#top" class="brand">${escapeHtml(t.name)}</a>
              <nav class="nav" aria-label="Main navigation">
                <a href="#about">${escapeHtml(t.nav[0])}</a>
                <a href="#wolt">${escapeHtml(t.nav[1])}</a>
                <a href="#tirat">${escapeHtml(t.nav[2])}</a>
                <a href="#mockup-print">${escapeHtml(t.nav[3])}</a>
                <a href="#mockup-guerrilla">${escapeHtml(t.nav[4])}</a>
                <a href="#own">${escapeHtml(t.nav[5])}</a>
                <a href="#tzahi">${escapeHtml(t.nav[6])}</a>
                <a href="#fans">${escapeHtml(t.nav[7])}</a>
                <a href="#contact">${escapeHtml(t.nav[8])}</a>
              </nav>
              <button class="lang-button" type="button" aria-label="Switch language">${escapeHtml(t.langLabel)}</button>
            </div>
          </header>

          <section id="top" class="container hero">
            <h1 class="hero-title">${escapeHtml(t.title)}</h1>
            <p class="intro">${escapeHtml(t.intro)}</p>
            <div class="actions">
              <a href="#about" class="button primary">${escapeHtml(t.start)}</a>
              <a href="#contact" class="button secondary">${escapeHtml(t.contact)}</a>
            </div>
          </section>

          <section id="about" class="about">
            <div class="container about-grid">
              <h2 class="about-title">${escapeHtml(t.about)}</h2>
              <p class="about-text">${escapeHtml(t.aboutText)}</p>
              <img class="about-image" src="avshalom-about-chair.jpg" alt="אבשלום קיגלר חושב עם כיסא" />
            </div>
          </section>

          ${workSection({ id: "wolt", number: "01", title: t.wolt, text: "", cta: t.sectionCta, t })}
          ${workSection({ id: "tirat", number: "02", title: t.tirat, text: "", cta: t.sectionCta, t })}
          ${workSection({ id: "mockup-print", number: "03", title: t.mockupPrint, text: "", cta: t.sectionCta, t })}
          ${workSection({ id: "mockup-guerrilla", number: "04", title: t.mockupGuerrilla, text: "", cta: t.sectionCta, t })}
          ${workSection({ id: "own", number: "05", title: t.own, text: "", cta: t.sectionCta, t })}
          ${workSection({ id: "tzahi", number: "06", title: t.tzahi, text: "", cta: t.sectionCta, t })}
          <section id="fans" class="work-section">
            <div class="container work-grid">
              <div>
                <h2 class="work-title">${escapeHtml(t.fans)}</h2>
              </div>
            </div>
            <div class="container reference-layout">
              <div>
                <p class="reference-lead compact">
                  ${escapeHtml(t.fansText)}
                </p>
              </div>
              <a class="site-preview-card" href="https://www.fans4avshi.com/" target="_blank" rel="noreferrer">
                <span class="site-preview-thumb"></span>
                <span class="site-preview-meta">
                  <strong>fans4avshi.com</strong>
                  <small>${escapeHtml(t.fansLinkLabel)}</small>
                </span>
              </a>
            </div>
          </section>

          <footer id="contact" class="footer">
            <div class="container footer-inner">
              <h2 class="footer-title">${escapeHtml(t.footer)}</h2>
              <div class="contact-actions">
                <a href="https://wa.me/972544512092" class="button whatsapp" target="_blank" rel="noreferrer">${escapeHtml(t.whatsappLabel)}</a>
                <a href="mailto:${escapeHtml(t.email)}" class="button primary">${escapeHtml(t.emailLabel)}</a>
              </div>
            </div>
          </footer>

          <div class="image-modal" aria-hidden="true">
            <button class="image-modal-close" type="button" aria-label="סגירת תמונה">×</button>
            <img src="" alt="" />
          </div>
        `;

        app.querySelector(".lang-button").addEventListener("click", () => {
          lang = isHebrew ? "en" : "he";
          render();
        });

        const closeCampaign = (item) => {
          const toggle = item.querySelector(".campaign-toggle");
          const full = item.querySelector(".campaign-full");
          item.classList.remove("is-open");
          if (toggle) {
            toggle.setAttribute("aria-expanded", "false");
          }
          if (full) {
            full.setAttribute("aria-hidden", "true");
          }
        };

        app.querySelectorAll(".campaign-toggle").forEach((toggle) => {
          toggle.addEventListener("click", () => {
            const item = toggle.closest(".campaign-item");
            if (!item) {
              return;
            }

            const shouldOpen = !item.classList.contains("is-open");
            app.querySelectorAll(".campaign-item.is-open").forEach(closeCampaign);

            if (shouldOpen) {
              const full = item.querySelector(".campaign-full");
              item.classList.add("is-open");
              toggle.setAttribute("aria-expanded", "true");
              if (full) {
                full.setAttribute("aria-hidden", "false");
              }
            }
          });
        });

        app.querySelectorAll("[data-carousel]").forEach((carousel) => {
          const track = carousel.querySelector(".carousel-track");
          const slides = carousel.querySelectorAll(".carousel-slide");
          const next = carousel.querySelector(".carousel-next");
          let index = 0;

          if (!track || !next || slides.length < 2) {
            return;
          }

          next.addEventListener("click", () => {
            index = (index + 1) % slides.length;
            track.style.transform = `translateX(${-index * 100}%)`;
          });
        });

        const modal = app.querySelector(".image-modal");
        const modalImage = modal.querySelector("img");
        const closeModal = () => {
          modal.classList.remove("is-open");
          modal.setAttribute("aria-hidden", "true");
          modalImage.src = "";
          modalImage.alt = "";
        };

        app.querySelectorAll("[data-zoom-src]").forEach((button) => {
          button.addEventListener("click", () => {
            const image = button.matches("img") ? button : button.querySelector("img");
            modalImage.src = button.dataset.zoomSrc;
            modalImage.alt = image ? image.alt : "";
            modal.classList.add("is-open");
            modal.setAttribute("aria-hidden", "false");
          });
        });

        modal.addEventListener("click", (event) => {
          if (event.target === modal || event.target.closest(".image-modal-close")) {
            closeModal();
          }
        });

        document.addEventListener("keydown", (event) => {
          if (event.key === "Escape") {
            closeModal();
          }
        });

        window.setTimeout(() => {
          if (!app.querySelector(".tiktok-embed")) {
            return;
          }

          const existingScript = document.querySelector('script[src="https://www.tiktok.com/embed.js"]');
          if (existingScript) {
            existingScript.remove();
          }

          const script = document.createElement("script");
          script.src = "https://www.tiktok.com/embed.js";
          script.async = true;
          document.body.appendChild(script);
        }, 0);

        window.setTimeout(() => {
          if (!app.querySelector(".instagram-media")) {
            return;
          }

          const processInstagram = () => {
            if (window.instgrm && window.instgrm.Embeds) {
              window.instgrm.Embeds.process();
            }
          };

          const existingScript = document.querySelector('script[src="https://www.instagram.com/embed.js"]');
          if (existingScript) {
            processInstagram();
            return;
          }

          const script = document.createElement("script");
          script.src = "https://www.instagram.com/embed.js";
          script.async = true;
          script.onload = processInstagram;
          document.body.appendChild(script);
        }, 0);
      }

      render();
    </script>
  </body>
</html>
