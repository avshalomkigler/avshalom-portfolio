<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1000" viewBox="0 0 1440 1000">
  <rect width="1440" height="1000" fill="#000"/>
  <line x1="0" y1="76" x2="1440" y2="76" stroke="#fff" stroke-opacity=".1"/>
  <text x="1280" y="46" fill="#fff" font-family="Arial, sans-serif" font-size="20" font-weight="700" text-anchor="end">אבשלום קיגלר</text>
  <text x="720" y="46" fill="#fff" fill-opacity=".8" font-family="Arial, sans-serif" font-size="17" text-anchor="middle">עבודות          עליי          יצירת קשר</text>
  <rect x="80" y="22" width="58" height="34" rx="17" fill="none" stroke="#fff" stroke-opacity=".35"/>
  <text x="109" y="44" fill="#fff" font-family="Arial, sans-serif" font-size="14" text-anchor="middle">EN</text>

  <text x="1280" y="560" fill="#fff" fill-opacity=".62" font-family="Arial, sans-serif" font-size="18" letter-spacing="8" text-anchor="end">אבשלום קיגלר</text>
  <text x="1280" y="650" fill="#fff" font-family="Arial, sans-serif" font-size="104" font-weight="700" text-anchor="end">מוזיקאי, קופירייטר, יוצר</text>
  <text x="1280" y="735" fill="#fff" fill-opacity=".75" font-family="Arial, sans-serif" font-size="27" text-anchor="end">רעיונות, מילים וקונספטים שחיים בין פרסום, תרבות, מוזיקה ותוכן.</text>
  <text x="1280" y="782" fill="#fff" fill-opacity=".75" font-family="Arial, sans-serif" font-size="27" text-anchor="end">תיק עבודות מתפתח - מתחיל בוולט, ממשיך לטירת צבי, ומתרחב משם.</text>

  <rect x="1018" y="848" width="170" height="48" rx="24" fill="#fff"/>
  <text x="1103" y="878" fill="#000" font-family="Arial, sans-serif" font-size="16" font-weight="700" text-anchor="middle">לצפייה בעבודות</text>
  <rect x="1210" y="848" width="116" height="48" rx="24" fill="none" stroke="#fff" stroke-opacity=".35"/>
  <text x="1268" y="878" fill="#fff" font-family="Arial, sans-serif" font-size="16" font-weight="700" text-anchor="middle">דברו איתי</text>

  <text x="1280" y="968" fill="#fff" fill-opacity=".25" font-family="Arial, sans-serif" font-size="15" text-anchor="end">תחילת הסקשן הבא: עבודות נבחרות</text>
</svg>
